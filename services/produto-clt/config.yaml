service:
  name: product-processing-sqs
  run_id: produto-clt

trigger:
  connector: sqs
  mode: async
  sqs:
    endpoint: ${PRODUCT_SQS_ENDPOINT:-http://localhost:4566}
    region: ${PRODUCT_AWS_REGION:-us-east-1}
    queue_url: ${PRODUCT_SQS_QUEUE_URL:-http://localhost:4566/000000000000/sample-test-convenio-133341}
    wait_time_seconds: 10
    max_messages: 1
    visibility_timeout: 30

rest:
  addr: ":8088"
  path: /process

mcp:
  enabled: true
  addr: ":9098"

state_store:
  type: dynamodb
  table: routing-slip-state
  region: us-east-1
  endpoint: ${PRODUCT_SQS_ENDPOINT:-http://localhost:4566}

idempotency:
  enabled: true
  key_template: "{workflow}:{message_id}:{step_index}:{step}"

graphql_endpoint: ${GRAPHQL_ENDPOINT:-http://localhost:8090/graphql}
