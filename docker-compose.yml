name: sample-test

networks:
  sample-test-cluster:
    name: sample-test-cluster

volumes:
  localstack-data:
  kafka-data:
  mock-service-data:

services:
  localstack:
    image: localstack/localstack:4.9.2
    hostname: localstack
    container_name: aws-cloud-services
    networks:
      - sample-test-cluster
    ports:
      - "4566:4566"
      - "4510-4559:4510-4559"
    environment:
      DEBUG: "1"
      PERSISTENCE: "1"
      SERVICES: "sns,sqs,dynamodb,lambda,sts"
      AWS_DEFAULT_REGION: "us-east-1"
      AWS_ACCESS_KEY_ID: "test"
      AWS_SECRET_ACCESS_KEY: "test"
      DOCKER_HOST: "unix:///var/run/docker.sock"
    volumes:
      - localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
      - ./scripts/localstack-init.sh:/scripts/localstack-init.sh:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 30

  kafka-broker:
    image: apache/kafka:3.8.1
    hostname: kafka-broker
    container_name: kafka-broker
    networks:
      - sample-test-cluster
    ports:
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-broker:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-broker:9092,PLAINTEXT_HOST://localhost:29092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
    volumes:
      - kafka-data:/var/lib/kafka/data
      - ./scripts/kafka-init.sh:/scripts/kafka-init.sh:ro
    healthcheck:
      test: [ "CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list" ]
      interval: 10s
      timeout: 10s
      retries: 30

  metrics-service:
    build:
      context: ./infra/metrics
    hostname: business-metrics-service
    container_name: business-metrics-service
    networks:
      - sample-test-cluster
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      SERVICE_ADDR: ":8080"
      DYNAMODB_ENDPOINT: "http://localstack:4566"
      DYNAMODB_TABLE: "custom-business-metrics-events"
      AWS_REGION: "us-east-1"
      AWS_ACCESS_KEY_ID: "test"
      AWS_SECRET_ACCESS_KEY: "test"
      RETENTION_DAYS: "30"
    labels:
      sample.aws.simulation: "ecs-service"
      sample.aws.cluster: "sample-test-cluster"
      sample.aws.service: "business-metrics-service"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 30

  acl-graphql-service:
    build:
      context: ./tools/acl
    hostname: acl-graphql-service
    container_name: acl-graphql-service
    networks:
      - sample-test-cluster
    depends_on:
      metrics-service:
        condition: service_healthy
      kafka-broker:
        condition: service_healthy
    environment:
      GRAPHQL_ADDR: ":8090"
      GRAPHQL_MCP_ADDR: ":9092"
      GRAPHQL_CONFIG_REFERENCE: "local:config/service.json"
      METRICS_ENDPOINT: "http://business-metrics-service:8080/v1/metrics"
      AWS_REGION: "us-east-1"
      AWS_ENDPOINT_URL: "http://localstack:4566"
      AWS_ACCESS_KEY_ID: "test"
      AWS_SECRET_ACCESS_KEY: "test"
      EXTERNAL_API_URL: "${EXTERNAL_API_URL:-https://mock.raysouz.studio}"
      EXTERNAL_API_SERIAL: "${EXTERNAL_API_SERIAL:-b7af3a9e-6d1a-4b15-9837-3e0f0b47e5b4}"
      ACL_KAFKA_BROKERS: "kafka-broker:9092"
      ACL_KAFKA_TOPIC: "desconto-realizado"
      ACL_KAFKA_GROUP_ID: "sample-test-acl"
    labels:
      sample.aws.simulation: "ecs-service"
      sample.aws.cluster: "sample-test-cluster"
      sample.aws.service: "acl-graphql-service"
    ports:
      - "8090:8090"
      - "9092:9092"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/graphql"]
      interval: 10s
      timeout: 5s
      retries: 30

  metrics-webview:
    image: nginx:1.27-alpine
    hostname: metrics-web-service
    container_name: metrics-web-service
    networks:
      - sample-test-cluster
    depends_on:
      metrics-service:
        condition: service_healthy
    volumes:
      - ./infra/webview:/usr/share/nginx/html:ro
      - ./infra/webview/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      sample.aws.simulation: "ecs-service"
      sample.aws.cluster: "sample-test-cluster"
      sample.aws.service: "metrics-web-service"
    ports:
      - "4200:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  mock-service:
    build:
      context: ./tools/mock-service
    hostname: api-mock-service
    container_name: api-mock-service
    networks:
      - sample-test-cluster
    environment:
      MOCK_SERVICE_ADDR: ":4300"
      MOCK_SERVICE_DATA: "/data/mocks.json"
    volumes:
      - mock-service-data:/data
    labels:
      sample.aws.simulation: "ecs-service"
      sample.aws.cluster: "sample-test-cluster"
      sample.aws.service: "api-mock-service"
    ports:
      - "4300:4300"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4300/health"]
      interval: 10s
      timeout: 5s
      retries: 30

  service-recepcao-conciliacao:
    build:
      context: ./services/recepcao-conciliacao
      # dockerfile: Dockerfile.lambda
    hostname: service-recepcao-conciliacao
    container_name: service-recepcao-conciliacao
    networks:
      - sample-test-cluster
    depends_on:
      localstack:
        condition: service_healthy
      metrics-service:
        condition: service_healthy
      acl-graphql-service:
        condition: service_healthy
    environment:
      SERVICE_HTTP_ADDR: ":8087"
      SERVICE_MCP_ADDR: ":9097"
      SERVICE_PROCESS_PATH: "/process"
      METRICS_ENDPOINT: "http://business-metrics-service:8080/v1/metrics"
      GRAPHQL_ENDPOINT: "http://acl-graphql-service:8090/graphql"
      AWS_ENDPOINT_URL: "http://localstack:4566"
      AWS_REGION: "us-east-1"
      AWS_ACCESS_KEY_ID: "test"
      AWS_SECRET_ACCESS_KEY: "test"
      ROUTING_CONFIG_PATH: "/app/config.yaml"
      ROUTING_WORKFLOW_PATH: "/app/workflow.yaml"
    labels:
      sample.aws.simulation: "ecs-service"
      sample.aws.cluster: "sample-test-cluster"
      sample.aws.function: "service-recepcao-conciliacao"
    ports:
      - "8087:8087"
      - "9097:9097"
    
  service-produto-clt:
    build:
      context: ./services/produto-clt
    hostname: service-produto-clt
    container_name: service-produto-clt
    networks:
      - sample-test-cluster
    depends_on:
      localstack:
        condition: service_healthy
      metrics-service:
        condition: service_healthy
      acl-graphql-service:
        condition: service_healthy
    environment:
      PRODUCT_HTTP_ADDR: ":8088"
      PRODUCT_MCP_ADDR: ":9098"
      PRODUCT_SQS_ENDPOINT: "http://localstack:4566"
      PRODUCT_SQS_QUEUE_URL: "http://localstack:4566/000000000000/sample-test-convenio-133341"
      PRODUCT_AWS_REGION: "us-east-1"
      PRODUCT_AWS_ACCESS_KEY_ID: "test"
      PRODUCT_AWS_SECRET_ACCESS_KEY: "test"
      METRICS_ENDPOINT: "http://business-metrics-service:8080/v1/metrics"
      GRAPHQL_ENDPOINT: "http://acl-graphql-service:8090/graphql"
      PRODUCT_CONFIG_PATH: "/app/config.yaml"
      PRODUCT_WORKFLOW_PATH: "/app/workflow.yaml"
    labels:
      sample.aws.simulation: "ecs-service"
      sample.aws.cluster: "sample-test-cluster"
      sample.aws.service: "service-produto-clt"
    ports:
      - "8088:8088"
      - "9098:9098"

  agent-service:
    build:
      context: ./infra/agent
    hostname: agent-service
    container_name: ai-agent-service
    networks:
      - sample-test-cluster
    depends_on:
      - service-recepcao-conciliacao
      - service-produto-clt
    environment:
      AGENT_HTTP_ADDR: ":8095"
      AGENT_DEFAULT_TARGET: "all"
      AGENT_MCP_TARGETS: "service=http://service-recepcao-conciliacao:9097/mcp,product=http://service-produto-clt:9098/mcp"
      AGENT_LLM_PROVIDER: "${AGENT_LLM_PROVIDER:-heuristic}"
      AGENT_OLLAMA_URL: "${AGENT_OLLAMA_URL:-http://host.docker.internal:11434}"
      AGENT_OLLAMA_MODEL: "${AGENT_OLLAMA_MODEL:-smollm2:135m}"
      AGENT_REQUEST_TIMEOUT: "${AGENT_REQUEST_TIMEOUT:-12s}"
    labels:
      sample.aws.simulation: "ecs-service"
      sample.aws.cluster: "sample-test-cluster"
      sample.aws.service: "ai-agent-service"
    ports:
      - "8095:8095"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8095/health"]
      interval: 10s
      timeout: 5s
      retries: 30
